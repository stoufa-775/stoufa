<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stoufa Vlogs</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

/* GENERAL */
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* PARTICLES BACKGROUND */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* CONTAINER */
.container {
    padding: 80px 20px;
}

/* LOGO */
.logo {
    width: 170px;
    border-radius: 50%;
    animation: glow 2s infinite alternate;
}

/* GLOW */
@keyframes glow {
    from { box-shadow: 0 0 20px red; }
    to { box-shadow: 0 0 60px purple; }
}

/* NAME */
h1 {
    font-size: 45px;
    margin-top: 20px;
}

/* TYPING TEXT */
.typing {
    font-size: 20px;
    color: #38bdf8;
    margin-top: 10px;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn {
    display: inline-block;
    padding: 14px 25px;
    margin: 10px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.youtube {
    background: linear-gradient(45deg, red, orange);
}

.insta {
    background: linear-gradient(45deg, purple, pink);
}

.btn:hover {
    transform: scale(1.15);
    box-shadow: 0 0 20px white;
}

/* VIDEO */
.video {
    margin-top: 60px;
}

.video iframe {
    width: 90%;
    max-width: 750px;
    height: 420px;
    border-radius: 15px;
    box-shadow: 0 0 30px #38bdf8;
}

/* FOOTER */
footer {
    margin-top: 60px;
    padding: 20px;
    background: rgba(0,0,0,0.7);
}

</style>

</head>

<body>

<!-- PARTICLES -->
<div id="particles-js"></div>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- NAME -->
    <h1>Stoufa Vlogs 🎬</h1>

    <!-- TYPING TEXT -->
    <div class="typing" id="typing"></div>

    <!-- BUTTONS -->
    <div class="buttons">
        <a href="https://youtube.com/@stoufa_775?si=fJtuaUdxI0cP9dn-" target="_blank" class="btn youtube">🔴 Subscribe</a>
        <a href="https://www.instagram.com/stoufa_775?hl=en" target="_blank" class="btn insta">📸 Instagram</a>
    </div>

    <!-- VIDEO -->
    <div class="video">
        <h2>🎥 فيديو تعريفي</h2>
        <iframe src="https://www.youtube.com/embed/FBgB4cGKx74" frameborder="0" allowfullscreen></iframe>
    </div>

</div>

<footer>
    © 2026 Stoufa - All Rights Reserved
</footer>

<!-- PARTICLES SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true },
  }
});

/* TYPING EFFECT */
let text = "أنا ستوفا، صانع محتوى من تونس 🇹🇳 | Vlogs - مغامرات - Gaming 🔥";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}

typing();

</script>

</body>
</html>
